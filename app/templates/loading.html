<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Likitha Reddy - Loading...</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Fredoka:wght@700&amp;family=Bodoni+Moda:wght@700&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'brand-pink': '#ff7597',
              },
              fontFamily: {
                serif: ['"Bodoni Moda"', 'serif'],
                script: ['"Great Vibes"', 'cursive'],
                bubbly: ['"Fredoka"', 'sans-serif'],
              },
            }
          }
        }
    </script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #006051;
        }
        
        @keyframes progress-animation {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .animate-progress {
            animation: progress-animation 3s ease-in-out forwards;
        }

        .fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <main class="text-center px-4 flex flex-col items-center justify-center min-h-screen">
        <section class="branding">
            <h1 class="font-script text-white text-[80px] md:text-[140px] leading-tight">
                Likitha Reddy
            </h1>
            <p class="font-bubbly text-white text-xl md:text-3xl uppercase tracking-wider mt-2">
                Birthday Edition 2026
            </p>
        </section>

        <section class="flex justify-center mt-16">
            <div class="w-72 md:w-96 h-[1px] bg-white/20 relative overflow-hidden">
                <div class="absolute top-0 left-0 h-full bg-white animate-progress" id="progress-fill"></div>
            </div>
        </section>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Cinematic loading screen active...");
            
            // Redirect to the main gallery after the animation completes (3 seconds)
            setTimeout(() => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = "{{ url_for('main') }}";
                }, 500); // Wait for fade out
            }, 3000);
        });
    </script>
</body>
</html>
